info:
  name: /logout
  type: http
  seq: 10

http:
  method: POST
  url: http://localhost:3000/auth/logout
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refreshToken}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
