runtime:
  scripts:
    - type: after-response
      code: |-
        const response = res.getBody();
        const accessToken = response?.data?.accessToken
        const refreshToken = response?.data?.refreshToken
        bru.setVar("accessToken", accessToken);
        bru.setVar("refreshToken", refreshToken);

